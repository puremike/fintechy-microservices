apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: fintechy-microservices-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: fintechy-microservices/user-service
        ports:
        - containerPort: 8100
        envFrom:
        - configMapRef:
            name: fintechy-microservices-user-service-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: fintechy-microservices-dev
spec:
  type: LoadBalancer
  selector:
    app: user-service
  ports:
    - port: 8100
      targetPort: 8100